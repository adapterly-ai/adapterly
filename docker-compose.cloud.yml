services:
  adapterly:
    environment:
      - ADAPTERLY_MODE=cloud
      - ADAPTERLY_DATABASE_URL=postgresql+asyncpg://${DB_USER:-adapterly}:${DB_PASS:-adapterly}@db:5432/${DB_NAME:-adapterly}
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-adapterly}
      POSTGRES_PASSWORD: ${DB_PASS:-adapterly}
      POSTGRES_DB: ${DB_NAME:-adapterly}
    restart: unless-stopped

volumes:
  pgdata:
